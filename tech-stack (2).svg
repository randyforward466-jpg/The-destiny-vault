<svg viewBox="0 0 860 340" xmlns="http://www.w3.org/2000/svg" width="860" height="340" role="img">
  <defs>
    <style>
      .bg-base { fill:#0d1117; }
      @keyframes borderFlicker {
        0%,92%,100% { stroke:#30363d; }
        93% { stroke:#ff2e63; } 94% { stroke:#30363d; }
        96% { stroke:#08d9d6; } 97% { stroke:#30363d; }
      }
      .frame { animation: borderFlicker 4s infinite; }
      @keyframes labelPulse { 0%,100%{opacity:0.55;} 50%{opacity:1;} }
      .label-text { animation: labelPulse 2.5s ease-in-out infinite; }
      @keyframes idxFlicker { 0%,100%{opacity:0.4;} 50%{opacity:0.15;} 51%{opacity:0.6;} }
      .index-text { animation: idxFlicker 3s infinite; }
      @keyframes rowGlow { 0%,100%{stroke:#21262d;} 50%{stroke:#08d9d6;} }
      .row-0 { animation: rowGlow 4s ease-in-out infinite; }
      .row-1 { animation: rowGlow 4s ease-in-out infinite 0.5s; }
      .row-2 { animation: rowGlow 4s ease-in-out infinite 1.0s; }
      .row-3 { animation: rowGlow 4s ease-in-out infinite 1.5s; }
      .row-4 { animation: rowGlow 4s ease-in-out infinite 2.0s; }
      .row-5 { animation: rowGlow 4s ease-in-out infinite 2.5s; }
      /* animated proficiency bars */
      @keyframes fill0 { 0%{width:0;} 100%{width:165px;} }
      @keyframes fill1 { 0%{width:0;} 100%{width:150px;} }
      @keyframes fill2 { 0%{width:0;} 100%{width:160px;} }
      @keyframes fill3 { 0%{width:0;} 100%{width:175px;} }
      @keyframes fill4 { 0%{width:0;} 100%{width:170px;} }
      @keyframes fill5 { 0%{width:0;} 100%{width:130px;} }
      .bar0 { animation: fill0 1.5s ease-out forwards; }
      .bar1 { animation: fill1 1.5s ease-out 0.15s forwards; }
      .bar2 { animation: fill2 1.5s ease-out 0.3s forwards; }
      .bar3 { animation: fill3 1.5s ease-out 0.45s forwards; }
      .bar4 { animation: fill4 1.5s ease-out 0.6s forwards; }
      .bar5 { animation: fill5 1.5s ease-out 0.75s forwards; }
    </style>
  </defs>

  <rect width="860" height="340" rx="6" class="bg-base"/>
  <rect x="1" y="1" width="858" height="338" rx="6" fill="none" stroke="#30363d" stroke-width="1.5" class="frame"/>

  <rect x="40" y="22" width="120" height="20" rx="2" fill="none" stroke="#30363d" stroke-width="1"/>
  <text x="50" y="36" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" letter-spacing="2" class="label-text">[ TECH STACK ]</text>
  <text x="820" y="36" font-family="'Courier New', monospace" font-size="10" fill="#6e7681" letter-spacing="1" text-anchor="end" class="index-text">02 / STACK</text>

  <!-- ROW TEMPLATE: icon | name | use-case | bar | level -->
  <!-- Row 0: JavaScript -->
  <g transform="translate(40,58)">
    <rect x="0" y="0" width="780" height="38" rx="3" fill="#161b22" stroke="#21262d" stroke-width="1" class="row-0"/>
    <rect x="12" y="8" width="22" height="22" rx="3" fill="#F7DF1E"/>
    <text x="23" y="25" font-family="Arial" font-size="12" font-weight="bold" fill="#0d1117" text-anchor="middle">JS</text>
    <text x="48" y="24" font-family="'Courier New', monospace" font-size="12" fill="#e6edf3" font-weight="bold">JavaScript</text>
    <text x="160" y="24" font-family="'Courier New', monospace" font-size="10" fill="#6e7681">// dynamic web logic &amp; SPAs</text>
    <rect x="590" y="14" width="180" height="10" rx="5" fill="#0d1117"/>
    <rect x="590" y="14" height="10" rx="5" fill="#08d9d6" class="bar0"/>
    <text x="775" y="11" font-family="'Courier New', monospace" font-size="8" fill="#8b949e" text-anchor="end">ADVANCED</text>
  </g>

  <!-- Row 1: TypeScript -->
  <g transform="translate(40,104)">
    <rect x="0" y="0" width="780" height="38" rx="3" fill="#161b22" stroke="#21262d" stroke-width="1" class="row-1"/>
    <rect x="12" y="8" width="22" height="22" rx="3" fill="#3178C6"/>
    <text x="23" y="25" font-family="Arial" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">TS</text>
    <text x="48" y="24" font-family="'Courier New', monospace" font-size="12" fill="#e6edf3" font-weight="bold">TypeScript</text>
    <text x="160" y="24" font-family="'Courier New', monospace" font-size="10" fill="#6e7681">// typed, scalable codebases</text>
    <rect x="590" y="14" width="180" height="10" rx="5" fill="#0d1117"/>
    <rect x="590" y="14" height="10" rx="5" fill="#ff2e63" class="bar1"/>
    <text x="775" y="11" font-family="'Courier New', monospace" font-size="8" fill="#8b949e" text-anchor="end">PROFICIENT</text>
  </g>

  <!-- Row 2: React -->
  <g transform="translate(40,150)">
    <rect x="0" y="0" width="780" height="38" rx="3" fill="#161b22" stroke="#21262d" stroke-width="1" class="row-2"/>
    <g transform="translate(23,19)">
      <circle r="2.3" fill="#61DAFB"/>
      <ellipse rx="10" ry="3.8" fill="none" stroke="#61DAFB" stroke-width="1.2"/>
      <ellipse rx="10" ry="3.8" fill="none" stroke="#61DAFB" stroke-width="1.2" transform="rotate(60)"/>
      <ellipse rx="10" ry="3.8" fill="none" stroke="#61DAFB" stroke-width="1.2" transform="rotate(120)"/>
    </g>
    <text x="48" y="24" font-family="'Courier New', monospace" font-size="12" fill="#e6edf3" font-weight="bold">React</text>
    <text x="160" y="24" font-family="'Courier New', monospace" font-size="10" fill="#6e7681">// component-driven UIs</text>
    <rect x="590" y="14" width="180" height="10" rx="5" fill="#0d1117"/>
    <rect x="590" y="14" height="10" rx="5" fill="#08d9d6" class="bar2"/>
    <text x="775" y="11" font-family="'Courier New', monospace" font-size="8" fill="#8b949e" text-anchor="end">ADVANCED</text>
  </g>

  <!-- Row 3: HTML5 + CSS3 -->
  <g transform="translate(40,196)">
    <rect x="0" y="0" width="780" height="38" rx="3" fill="#161b22" stroke="#21262d" stroke-width="1" class="row-3"/>
    <path d="M12,8 l20,0 l-2,22 l-8,3 l-8,-3 z" fill="#E34F26"/>
    <path d="M16,15 l12,0 l-0.4,4 l-7.6,0 l0.3,3 l7,0 l-0.6,5 l-5.5,1.5 l-5.5,-1.5 l-0.3,-3.5 l3,0 l0.15,1.8 l2.65,0.7 l2.65,-0.7 l0.2,-2.5 l-8.4,0 z" fill="#fff"/>
    <text x="48" y="24" font-family="'Courier New', monospace" font-size="12" fill="#e6edf3" font-weight="bold">HTML5 / CSS3</text>
    <text x="200" y="24" font-family="'Courier New', monospace" font-size="10" fill="#6e7681">// semantic markup &amp; responsive design</text>
    <rect x="590" y="14" width="180" height="10" rx="5" fill="#0d1117"/>
    <rect x="590" y="14" height="10" rx="5" fill="#ff2e63" class="bar3"/>
    <text x="775" y="11" font-family="'Courier New', monospace" font-size="8" fill="#8b949e" text-anchor="end">EXPERT</text>
  </g>

  <!-- Row 4: Python -->
  <g transform="translate(40,242)">
    <rect x="0" y="0" width="780" height="38" rx="3" fill="#161b22" stroke="#21262d" stroke-width="1" class="row-4"/>
    <g transform="translate(13,9)">
      <path d="M11,0 C6,0 6,3 6,5 l0,3 l5,0 l0,1 l-8,0 C1,9 0,11 0,15 C0,19 1,21 4,21 l2,0 l0,-4 C6,14 7,13 10,13 l5,0 C17,13 18,12 18,9 l0,-4 C18,2 17,0 11,0 z M8,3 a1.2,1.2 0 1,1 0,0.01 z" fill="#3776AB"/>
      <path d="M11,22 C16,22 16,19 16,17 l0,-3 l-5,0 l0,-1 l8,0 C21,13 22,11 22,7 C22,3 21,1 18,1 l-2,0 l0,4 C16,8 15,9 12,9 l-5,0 C5,9 4,10 4,13 l0,4 C4,20 5,22 11,22 z M14,19 a1.2,1.2 0 1,1 0,-0.01 z" fill="#FFD43B"/>
    </g>
    <text x="48" y="24" font-family="'Courier New', monospace" font-size="12" fill="#e6edf3" font-weight="bold">Python</text>
    <text x="160" y="24" font-family="'Courier New', monospace" font-size="10" fill="#6e7681">// automation, scripting &amp; APIs</text>
    <rect x="590" y="14" width="180" height="10" rx="5" fill="#0d1117"/>
    <rect x="590" y="14" height="10" rx="5" fill="#08d9d6" class="bar4"/>
    <text x="775" y="11" font-family="'Courier New', monospace" font-size="8" fill="#8b949e" text-anchor="end">PROFICIENT</text>
  </g>

  <!-- Row 5: AWS + Git -->
  <g transform="translate(40,288)">
    <rect x="0" y="0" width="780" height="38" rx="3" fill="#161b22" stroke="#21262d" stroke-width="1" class="row-5"/>
    <text x="23" y="22" font-family="Arial" font-size="10" font-weight="bold" fill="#FF9900" text-anchor="middle">aws</text>
    <path d="M14,26 q9,3 18,0" fill="none" stroke="#FF9900" stroke-width="1.3"/>
    <text x="48" y="24" font-family="'Courier New', monospace" font-size="12" fill="#e6edf3" font-weight="bold">AWS / Git</text>
    <text x="170" y="24" font-family="'Courier New', monospace" font-size="10" fill="#6e7681">// cloud deploy &amp; version control</text>
    <rect x="590" y="14" width="180" height="10" rx="5" fill="#0d1117"/>
    <rect x="590" y="14" height="10" rx="5" fill="#ff2e63" class="bar5"/>
    <text x="775" y="11" font-family="'Courier New', monospace" font-size="8" fill="#8b949e" text-anchor="end">LEARNING</text>
  </g>
</svg>
