<svg viewBox="0 0 860 110" xmlns="http://www.w3.org/2000/svg" width="860" height="110" role="img">
  <defs>
    <style>
      .bg-base { fill:#0d1117; }
      @keyframes borderFlicker {
        0%,92%,100% { stroke:#30363d; }
        93% { stroke:#ff2e63; } 94% { stroke:#30363d; }
        96% { stroke:#08d9d6; } 97% { stroke:#30363d; }
      }
      .frame { animation: borderFlicker 4s infinite; }
      @keyframes labelPulse { 0%,100%{opacity:0.55;} 50%{opacity:1;} }
      .label-text { animation: labelPulse 2.5s ease-in-out infinite; }
      @keyframes floatSoc { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-4px);} }
      .soc-0 { animation: floatSoc 2.6s ease-in-out infinite; }
      .soc-1 { animation: floatSoc 2.6s ease-in-out infinite 0.3s; }
      .soc-2 { animation: floatSoc 2.6s ease-in-out infinite 0.6s; }
      .soc-3 { animation: floatSoc 2.6s ease-in-out infinite 0.9s; }
      .soc-4 { animation: floatSoc 2.6s ease-in-out infinite 1.2s; }
      @keyframes glowPink { 0%,100%{stroke:#30363d;} 50%{stroke:#ff2e63;} }
      @keyframes glowCyan { 0%,100%{stroke:#30363d;} 50%{stroke:#08d9d6;} }
      .glow-pink { animation: glowPink 3s ease-in-out infinite; }
      .glow-cyan { animation: glowCyan 3s ease-in-out infinite 1.5s; }
      @keyframes idxFlicker { 0%,100%{opacity:0.4;} 50%{opacity:0.15;} 51%{opacity:0.6;} }
      .index-text { animation: idxFlicker 3s infinite; }
    </style>
  </defs>

  <rect width="860" height="110" rx="6" class="bg-base"/>
  <rect x="1" y="1" width="858" height="108" rx="6" fill="none" stroke="#30363d" stroke-width="1.5" class="frame"/>

  <rect x="40" y="20" width="110" height="20" rx="2" fill="none" stroke="#30363d" stroke-width="1"/>
  <text x="50" y="34" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" letter-spacing="2" class="label-text">[ CONNECT ]</text>
  <text x="820" y="34" font-family="'Courier New', monospace" font-size="10" fill="#6e7681" letter-spacing="1" text-anchor="end" class="index-text">03 / SOCIALS</text>

  <g transform="translate(40, 58)">
    <!-- Discord -->
    <g class="soc-0">
      <rect x="0" y="0" width="135" height="34" rx="3" fill="#161b22" stroke="#30363d" stroke-width="1" class="glow-cyan"/>
      <g transform="translate(11,10)">
        <path d="M13,1 C10,0 4,0 1,1 C-1,6 -1,11 1,15 C3,16 5,17 6,17 l1,-2 C6,15 5,14 5,14 l1,-0.5 C8,15 11,15 13,14 l1,0.5 l-1,1 C14,16 16,15.5 18,14 C19,10 19,5 18,1 C15,0 12,0 13,1 z M7,11 a1.3,1.6 0 1,1 0,0.01 z M13,11 a1.3,1.6 0 1,1 0,0.01 z" fill="#5865F2"/>
      </g>
      <text x="40" y="22" font-family="'Courier New', monospace" font-size="10" fill="#e6edf3" letter-spacing="1">DISCORD</text>
    </g>
    <!-- Instagram -->
    <g class="soc-1" transform="translate(150,0)">
      <rect x="0" y="0" width="148" height="34" rx="3" fill="#161b22" stroke="#30363d" stroke-width="1" class="glow-pink"/>
      <g transform="translate(11,9)">
        <rect x="0" y="0" width="17" height="17" rx="5" fill="none" stroke="#E4405F" stroke-width="2"/>
        <circle cx="8.5" cy="8.5" r="4" fill="none" stroke="#E4405F" stroke-width="2"/>
        <circle cx="13.5" cy="3.5" r="1.3" fill="#E4405F"/>
      </g>
      <text x="40" y="22" font-family="'Courier New', monospace" font-size="10" fill="#e6edf3" letter-spacing="1">INSTAGRAM</text>
    </g>
    <!-- Facebook -->
    <g class="soc-2" transform="translate(311,0)">
      <rect x="0" y="0" width="140" height="34" rx="3" fill="#161b22" stroke="#30363d" stroke-width="1" class="glow-cyan"/>
      <g transform="translate(11,9)">
        <circle cx="8.5" cy="8.5" r="8.5" fill="#0866FF"/>
        <path d="M10.5,8.5 l0.4,-2.5 l-2.4,0 l0,-1.6 C8.5,3.6 8.8,3 9.9,3 l1.1,0 l0,-2.2 C10.7,0.7 9.8,0.6 9,0.6 C7,0.6 6,1.8 6,3.8 l0,2.2 l-2,0 l0,2.5 l2,0 l0,6.3 l2.5,0 l0,-6.3 z" fill="#fff"/>
      </g>
      <text x="40" y="22" font-family="'Courier New', monospace" font-size="10" fill="#e6edf3" letter-spacing="1">FACEBOOK</text>
    </g>
    <!-- Gmail -->
    <g class="soc-3" transform="translate(464,0)">
      <rect x="0" y="0" width="115" height="34" rx="3" fill="#161b22" stroke="#30363d" stroke-width="1" class="glow-pink"/>
      <g transform="translate(11,11)">
        <rect x="0" y="0" width="18" height="13" rx="1.5" fill="#fff"/>
        <path d="M0,1 l9,7 l9,-7" fill="none" stroke="#EA4335" stroke-width="2"/>
      </g>
      <text x="40" y="22" font-family="'Courier New', monospace" font-size="10" fill="#e6edf3" letter-spacing="1">GMAIL</text>
    </g>
    <!-- LinkedIn -->
    <g class="soc-4" transform="translate(592,0)">
      <rect x="0" y="0" width="135" height="34" rx="3" fill="#161b22" stroke="#30363d" stroke-width="1" class="glow-cyan"/>
      <g transform="translate(11,9)">
        <rect x="0" y="0" width="17" height="17" rx="2.5" fill="#0A66C2"/>
        <rect x="3" y="6.5" width="2.5" height="7" fill="#fff"/>
        <circle cx="4.25" cy="3.5" r="1.5" fill="#fff"/>
        <path d="M7.5,13.5 l0,-7 l2.4,0 l0,1 C10.4,6.5 11.5,6.2 12.5,7 C13.5,7.8 13.5,9 13.5,10 l0,3.5 l-2.4,0 l0,-3 C11.1,9.5 11,9 10.3,9 C9.7,9 9.5,9.5 9.5,10.3 l0,3.2 z" fill="#fff"/>
      </g>
      <text x="40" y="22" font-family="'Courier New', monospace" font-size="10" fill="#e6edf3" letter-spacing="1">LINKEDIN</text>
    </g>
  </g>
</svg>
