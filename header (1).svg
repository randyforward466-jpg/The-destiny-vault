<svg viewBox="0 0 860 300" xmlns="http://www.w3.org/2000/svg" width="860" height="300" role="img">
  <defs>
    <style>
      .bg-base { fill: #0d1117; }
      @keyframes scan { 0%{transform:translateY(0);} 100%{transform:translateY(8px);} }
      .scanlines { animation: scan 0.5s steps(2) infinite; opacity: 0.05; }
      @keyframes borderFlicker {
        0%,92%,100% { stroke:#30363d; }
        93% { stroke:#ff2e63; } 94% { stroke:#30363d; }
        96% { stroke:#08d9d6; } 97% { stroke:#30363d; }
      }
      .frame { animation: borderFlicker 4s infinite; }
      @keyframes labelPulse { 0%,100%{opacity:0.55;} 50%{opacity:1;} }
      .label-text { animation: labelPulse 2.5s ease-in-out infinite; }
      @keyframes labelBoxGlow { 0%,100%{stroke:#30363d;} 50%{stroke:#6e7681;} }
      .label-box { animation: labelBoxGlow 2.5s ease-in-out infinite; }
      @keyframes glitchShake {
        0%,88%,93%,100% { transform: translate(0,0); }
        89% { transform: translate(-3px,1px); }
        90% { transform: translate(3px,-1px); }
        91% { transform: translate(-2px,0); }
        92% { transform: translate(2px,1px); }
      }
      .randy-group { animation: glitchShake 5s infinite; }
      @keyframes ghostCyan {
        0%,87%,100% { opacity:0; transform: translate(0,0); }
        89% { opacity:0.8; transform: translate(-4px,2px); }
        92% { opacity:0.5; transform: translate(3px,-2px); }
      }
      @keyframes ghostPink {
        0%,87%,100% { opacity:0; transform: translate(0,0); }
        89% { opacity:0.8; transform: translate(4px,-2px); }
        92% { opacity:0.5; transform: translate(-3px,2px); }
      }
      .ghost-cyan { animation: ghostCyan 5s infinite; fill:#08d9d6; }
      .ghost-pink { animation: ghostPink 5s infinite; fill:#ff2e63; }
      @keyframes drawStroke {
        0% { stroke-dashoffset:1400; } 60% { stroke-dashoffset:0; } 100% { stroke-dashoffset:0; }
      }
      .lizarme { stroke-dasharray:1400; animation: drawStroke 4s ease-in-out infinite alternate; }
      @keyframes lizColor {
        0%{stroke:#e6edf3;} 50%{stroke:#08d9d6;} 100%{stroke:#ff2e63;}
      }
      .lizarme-color { animation: lizColor 6s ease-in-out infinite alternate; }
      @keyframes sweep {
        0%{transform:scaleX(0);transform-origin:left;}
        50%{transform:scaleX(1);transform-origin:left;}
        51%{transform:scaleX(1);transform-origin:right;}
        100%{transform:scaleX(0);transform-origin:right;}
      }
      .divider { animation: sweep 4s ease-in-out infinite; }
      @keyframes typeReveal { 0%{width:0;} 40%{width:200px;} 100%{width:200px;} }
      .tag-clip rect { animation: typeReveal 4s steps(24) infinite; }
      @keyframes caretBlink { 0%,49%{opacity:1;} 50%,100%{opacity:0;} }
      .caret { animation: caretBlink 0.8s steps(1) infinite; }
      @keyframes dotPulse { 0%,100%{r:3;opacity:1;} 50%{r:5;opacity:0.5;} }
      .status-dot { animation: dotPulse 1.5s ease-in-out infinite; }
      @keyframes ringPulse { 0%{r:3;opacity:0.8;} 100%{r:12;opacity:0;} }
      .status-ring { animation: ringPulse 1.5s ease-out infinite; }
      @keyframes idxFlicker { 0%,100%{opacity:0.4;} 50%{opacity:0.15;} 51%{opacity:0.6;} }
      .index-text { animation: idxFlicker 3s infinite; }
      @keyframes floatA { 0%,100%{transform:translateY(0) rotate(-8deg);} 50%{transform:translateY(-4px) rotate(-8deg);} }
      @keyframes floatB { 0%,100%{transform:translateY(0) rotate(6deg);} 50%{transform:translateY(4px) rotate(6deg);} }
      .sticker-a { animation: floatA 3s ease-in-out infinite; }
      .sticker-b { animation: floatB 3.5s ease-in-out infinite; }
    </style>
    <clipPath id="tag-clip" class="tag-clip">
      <rect x="40" y="248" width="0" height="20"/>
    </clipPath>
    <linearGradient id="randyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c9d1d9"/>
    </linearGradient>
  </defs>

  <rect width="860" height="300" rx="6" class="bg-base"/>

  <g class="scanlines">
    <rect x="0" y="0" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="6" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="12" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="18" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="24" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="30" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="36" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="42" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="48" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="54" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="60" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="66" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="72" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="78" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="84" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="90" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="96" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="102" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="108" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="114" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="120" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="126" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="132" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="138" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="144" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="150" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="156" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="162" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="168" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="174" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="180" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="186" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="192" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="198" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="204" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="210" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="216" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="222" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="228" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="234" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="240" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="246" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="252" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="258" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="264" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="270" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="276" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="282" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="288" width="860" height="2" fill="#ffffff"/>
    <rect x="0" y="294" width="860" height="2" fill="#ffffff"/>
  </g>

  <rect x="1" y="1" width="858" height="298" rx="6" fill="none" stroke="#30363d" stroke-width="1.5" class="frame"/>

  <rect x="40" y="36" width="242" height="22" rx="2" fill="none" stroke="#30363d" stroke-width="1" class="label-box"/>
  <text x="52" y="51" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" letter-spacing="2.5" class="label-text">[ FULL STACK WEB DEVELOPER ]</text>

  <text x="820" y="51" font-family="'Courier New', monospace" font-size="10" fill="#6e7681" letter-spacing="1" text-anchor="end" class="index-text">01 / PROFILE</text>

  <g class="randy-group">
    <text x="40" y="150" font-family="Georgia, serif" font-size="92" font-weight="900" letter-spacing="-3" class="ghost-cyan">RANDY</text>
    <text x="40" y="150" font-family="Georgia, serif" font-size="92" font-weight="900" letter-spacing="-3" class="ghost-pink">RANDY</text>
    <text x="40" y="150" font-family="Georgia, serif" font-size="92" font-weight="900" fill="url(#randyGrad)" letter-spacing="-3">RANDY</text>
  </g>

  <text x="40" y="224" font-family="Georgia, serif" font-size="92" font-weight="900" font-style="italic" fill="none" stroke-width="1.5" letter-spacing="-3" class="lizarme lizarme-color">LIZARME</text>

  <rect x="40" y="244" width="780" height="1.5" fill="#08d9d6" class="divider"/>

  <g clip-path="url(#tag-clip)">
    <text x="40" y="262" font-family="'Courier New', monospace" font-size="11" fill="#8b949e" letter-spacing="1.5">Turning ideas into code.</text>
  </g>
  <rect x="190" y="254" width="6" height="11" fill="#08d9d6" class="caret"/>

  <rect x="690" y="250" width="130" height="20" rx="2" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <circle cx="704" cy="260" r="3" fill="none" stroke="#3fb950" stroke-width="1.5" class="status-ring"/>
  <circle cx="704" cy="260" r="3" fill="#3fb950" class="status-dot"/>
  <text x="716" y="264" font-family="'Courier New', monospace" font-size="9" fill="#e6edf3" letter-spacing="1.5">AVAILABLE FOR WORK</text>

  <g class="sticker-a" transform="translate(770, 110)">
    <rect x="-30" y="-12" width="60" height="24" fill="#ff2e63" rx="1"/>
    <text x="0" y="4" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#0d1117" text-anchor="middle" letter-spacing="1">&lt;/&gt;</text>
  </g>
  <g class="sticker-b" transform="translate(700, 175)">
    <rect x="-26" y="-10" width="52" height="20" fill="#08d9d6" rx="1"/>
    <text x="0" y="4" font-family="'Courier New', monospace" font-size="9" font-weight="bold" fill="#0d1117" text-anchor="middle" letter-spacing="1">DEV</text>
  </g>

</svg>
